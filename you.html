<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
canvas{position:fixed;inset:0;width:100vw;height:100vh;z-index:1;}

/* ── WARNING SCREEN ── */
#warningScreen{
  position:fixed;inset:0;z-index:100;
  background:radial-gradient(ellipse at center,#0a0500 0%,#000000 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 1.2s ease;
}
#warningScreen.hide{opacity:0;pointer-events:none;}

.warning-content{
  text-align:center;padding:0 20px;
  animation:fadeIn 1.5s ease-out;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.warning-icon{
  font-size:clamp(48px,12vw,80px);
  margin-bottom:clamp(20px,4vh,35px);
  animation:iconPulse 2s ease-in-out infinite;
}
@keyframes iconPulse{0%,100%{transform:scale(1);opacity:0.9;}50%{transform:scale(1.08);opacity:1;}}

.warning-title{
  font-family:'Cinzel',serif;
  font-size:clamp(22px,5vw,38px);
  letter-spacing:4px;
  color:#ffe97a;
  margin-bottom:clamp(25px,5vh,40px);
  text-shadow:0 0 20px rgba(255,200,50,0.5);
}

.warning-instructions{
  display:flex;flex-direction:column;gap:clamp(18px,3.5vh,28px);
  margin-bottom:clamp(35px,6vh,55px);
}

.instruction-item{
  display:flex;align-items:center;justify-content:center;
  gap:clamp(12px,2.5vw,18px);
  font-family:'Cinzel',serif;
  font-size:clamp(14px,3vw,18px);
  color:rgba(255,220,150,0.85);
  letter-spacing:2px;
  animation:slideIn 1s ease-out backwards;
}
.instruction-item:nth-child(1){animation-delay:0.3s;}
.instruction-item:nth-child(2){animation-delay:0.5s;}

@keyframes slideIn{from{opacity:0;transform:translateX(-30px);}to{opacity:1;transform:translateX(0);}}

.instruction-icon{
  font-size:clamp(24px,5vw,32px);
  animation:bounce 2s ease-in-out infinite;
}
.instruction-item:nth-child(2) .instruction-icon{animation-delay:0.3s;}

@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}

#readyBtn{
  position:relative;
  padding:clamp(14px,3vh,18px) clamp(38px,8vw,52px);
  font-family:'Cinzel',serif;
  font-size:clamp(15px,3.2vw,20px);
  letter-spacing:4px;
  color:#ffe97a;
  background:transparent;
  border:none;
  cursor:pointer;
  outline:none;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  box-shadow:0 0 25px 6px rgba(255,200,50,0.4),0 0 50px 12px rgba(255,150,0,0.2);
  border-radius:50px;
  transition:all 0.3s ease;
  animation:btnGlow 2s ease-in-out infinite alternate;
  animation-delay:1s;
}

@keyframes btnGlow{
  from{box-shadow:0 0 25px 6px rgba(255,200,50,0.4),0 0 50px 12px rgba(255,150,0,0.2);}
  to{box-shadow:0 0 35px 8px rgba(255,200,50,0.6),0 0 70px 16px rgba(255,150,0,0.3);}
}

#readyBtn::before{
  content:'';position:absolute;inset:0;border-radius:50px;
  background:linear-gradient(135deg,#7a5100,#f5c842,#b8860b,#ffe066,#7a5100);
  background-size:300% 300%;
  animation:goldShift 4s ease infinite;
  z-index:-1;
}

#readyBtn::after{
  content:'';position:absolute;inset:2.5px;border-radius:47px;
  background:radial-gradient(ellipse at center,#1a0a00 50%,#2e1500);
  z-index:-1;
}

@keyframes goldShift{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

#readyBtn:hover{
  transform:scale(1.05);
  box-shadow:0 0 40px 10px rgba(255,200,50,0.6),0 0 80px 20px rgba(255,150,0,0.3);
}

#readyBtn:active{
  transform:scale(0.98);
  box-shadow:0 0 15px 4px rgba(255,200,50,0.5);
}

.btn-sparkles{
  position:absolute;
  width:6px;height:6px;
  border-radius:50%;
  background:#ffe97a;
  box-shadow:0 0 8px 2px rgba(255,230,122,0.8);
  animation:sparklePop 2.5s ease-in-out infinite;
}

@keyframes sparklePop{
  0%,100%{opacity:0;transform:scale(0);}
  50%{opacity:1;transform:scale(1.2);}
}

/* ── HAPPY BIRTHDAY SPLASH ── */
#hbdSplash{
  position:fixed;inset:0;z-index:99;
  background:radial-gradient(ellipse at center,#0f0800 0%,#000000 100%);
  display:none;
  align-items:center;justify-content:center;
  opacity:0;
  transition:opacity 1.5s ease;
}
#hbdSplash.show{opacity:1;}
#hbdSplash.hide{opacity:0;}

.hbd-text{
  font-family:'Cinzel',serif;
  font-size:clamp(32px,8vw,85px);
  letter-spacing:clamp(6px,1.5vw,14px);
  text-align:center;
  background:linear-gradient(135deg,#d4af37,#f5e6a5,#ffd700,#f5c842,#b8860b,#ffd700,#d4af37);
  background-size:400% 400%;
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:gradientFlow 5s ease infinite,textGlow 3s ease-in-out infinite alternate;
  text-shadow:0 0 40px rgba(255,215,0,0.6),0 0 80px rgba(255,215,0,0.3);
  filter:drop-shadow(0 0 25px rgba(255,215,0,0.5)) drop-shadow(0 0 50px rgba(255,215,0,0.2));
  position:relative;
  padding:0 20px;
}

@keyframes gradientFlow{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

@keyframes textGlow{
  from{filter:drop-shadow(0 0 20px rgba(255,215,0,0.4)) drop-shadow(0 0 40px rgba(255,215,0,0.15));}
  to{filter:drop-shadow(0 0 35px rgba(255,215,0,0.7)) drop-shadow(0 0 70px rgba(255,215,0,0.35));}
}

.hbd-sparkle{
  position:absolute;
  width:8px;height:8px;
  background:radial-gradient(circle,#ffd700 0%,#f5e6a5 50%,transparent 100%);
  border-radius:50%;
  pointer-events:none;
  animation:sparkleFloat 3s ease-in-out infinite;
  box-shadow:0 0 15px 3px rgba(255,215,0,0.6);
}

@keyframes sparkleFloat{
  0%,100%{transform:translate(0,0) scale(0);opacity:0;}
  50%{transform:translate(var(--tx),var(--ty)) scale(1.5);opacity:1;}
}

.hbd-particle{
  position:absolute;
  width:3px;height:3px;
  background:#ffd700;
  border-radius:50%;
  pointer-events:none;
  animation:particleRise 4s linear infinite;
  opacity:0;
}

@keyframes particleRise{
  0%{transform:translateY(0) translateX(0);opacity:0;}
  10%{opacity:0.8;}
  90%{opacity:0.8;}
  100%{transform:translateY(-100vh) translateX(var(--drift));opacity:0;}
}

/* ── MAIN CONTENT (hidden initially) ── */
#mainContent{display:none;}

#cakeWrap{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:min(68vw,68vh);height:min(68vw,68vh);
  z-index:0;pointer-events:none;
  opacity:0;transition:opacity 3.5s ease;
}
#cakeImg{width:100%;height:100%;object-fit:contain;display:block;mix-blend-mode:screen;}
#btnWrap{
  position:fixed;bottom:7vh;left:50%;transform:translateX(-50%);
  z-index:10;opacity:0;transition:opacity 1.8s ease;pointer-events:none;
}
#btnWrap.show{opacity:1;pointer-events:auto;}
#playBtn{
  position:relative;padding:16px 42px;
  font-family:'Cinzel',serif;font-size:clamp(13px,2.2vw,17px);
  letter-spacing:3px;color:#ffe97a;background:transparent;border:none;
  cursor:pointer;outline:none;-webkit-tap-highlight-color:transparent;user-select:none;
}
#playBtn::before{
  content:'';position:absolute;inset:0;border-radius:50px;
  background:linear-gradient(135deg,#7a5100,#f5c842,#b8860b,#ffe066,#7a5100);
  background-size:300% 300%;animation:goldShift 3s ease infinite;z-index:-1;
}
#playBtn::after{
  content:'';position:absolute;inset:2px;border-radius:48px;
  background:radial-gradient(ellipse at center,#1a0a00 60%,#2e1500);z-index:-1;
}
#playBtn{box-shadow:0 0 18px 4px rgba(255,200,50,0.35),0 0 40px 8px rgba(255,150,0,0.18);border-radius:50px;transition:box-shadow .2s,transform .15s;}
#playBtn:active{transform:scale(0.96);box-shadow:0 0 8px 2px rgba(255,200,50,0.5);}
.btn-inner{display:flex;align-items:center;gap:10px;}
.btn-note{font-size:1.3em;animation:noteBounce 1.4s ease-in-out infinite alternate;}
@keyframes noteBounce{from{transform:translateY(0);}to{transform:translateY(-4px);}}
.sparkle{position:absolute;width:5px;height:5px;border-radius:50%;background:#ffe97a;pointer-events:none;animation:sparklePop 2s ease-in-out infinite;}
</style>
</head>
<body>

<!-- ── HAPPY BIRTHDAY SPLASH ── -->
<div id="hbdSplash">
  <div class="hbd-text">HAPPY BIRTHDAY</div>
  <!-- Floating sparkles -->
  <span class="hbd-sparkle" style="top:15%;left:10%;--tx:20px;--ty:-30px;animation-delay:0s;"></span>
  <span class="hbd-sparkle" style="top:20%;right:15%;--tx:-25px;--ty:-20px;animation-delay:0.5s;"></span>
  <span class="hbd-sparkle" style="bottom:25%;left:12%;--tx:15px;--ty:25px;animation-delay:1s;"></span>
  <span class="hbd-sparkle" style="bottom:20%;right:18%;--tx:-30px;--ty:20px;animation-delay:1.5s;"></span>
  <span class="hbd-sparkle" style="top:50%;left:8%;--tx:25px;--ty:-15px;animation-delay:0.7s;"></span>
  <span class="hbd-sparkle" style="top:50%;right:8%;--tx:-20px;--ty:18px;animation-delay:1.2s;"></span>
  <span class="hbd-sparkle" style="top:35%;left:20%;--tx:18px;--ty:-25px;animation-delay:0.3s;"></span>
  <span class="hbd-sparkle" style="bottom:35%;right:22%;--tx:-22px;--ty:28px;animation-delay:1.8s;"></span>
  <!-- Rising particles -->
  <span class="hbd-particle" style="left:15%;--drift:20px;animation-delay:0s;"></span>
  <span class="hbd-particle" style="left:25%;--drift:-15px;animation-delay:0.8s;"></span>
  <span class="hbd-particle" style="left:35%;--drift:25px;animation-delay:1.6s;"></span>
  <span class="hbd-particle" style="left:45%;--drift:-20px;animation-delay:0.4s;"></span>
  <span class="hbd-particle" style="left:55%;--drift:18px;animation-delay:1.2s;"></span>
  <span class="hbd-particle" style="left:65%;--drift:-22px;animation-delay:2s;"></span>
  <span class="hbd-particle" style="left:75%;--drift:15px;animation-delay:0.6s;"></span>
  <span class="hbd-particle" style="left:85%;--drift:-18px;animation-delay:1.4s;"></span>
</div>

<!-- ── WARNING SCREEN ── -->
<div id="warningScreen">
  <div class="warning-content">
    <div class="warning-icon"></div>
    <div class="warning-title">Are you ready ?</div>
    
    <div class="warning-instructions">
      <div class="instruction-item">
        <span class="instruction-icon">🌙</span>
        <span>ปิดไฟ หรืออยู่ในที่มืด</span>
      </div>
      <div class="instruction-item">
        <span class="instruction-icon">🎧</span>
        <span>ใส่หูฟัง</span>
      </div>
    </div>
    
    <button id="readyBtn" onclick="startExperience()">
      READY
    </button>
    
    <!-- Sparkles around button -->
    <span class="btn-sparkles" style="top:-12px;left:15%;animation-delay:0s;"></span>
    <span class="btn-sparkles" style="top:-10px;right:18%;animation-delay:0.6s;"></span>
    <span class="btn-sparkles" style="bottom:-12px;left:20%;animation-delay:1.2s;"></span>
    <span class="btn-sparkles" style="bottom:-10px;right:15%;animation-delay:1.8s;"></span>
    <span class="btn-sparkles" style="top:40%;left:-15px;animation-delay:0.4s;"></span>
    <span class="btn-sparkles" style="top:40%;right:-15px;animation-delay:1.4s;"></span>
  </div>
</div>

<!-- ── MAIN CONTENT ── -->
<div id="mainContent">
  <div id="cakeWrap"><img id="cakeImg" src="" alt=""></div>
  <canvas id="c"></canvas>
  <div id="btnWrap">
    <button id="playBtn" onclick="playHBD()">
      <div class="btn-inner">
        <span class="btn-note"></span>
        <span>Happy Birthday</span>
        <span class="btn-note" style="animation-delay:.7s"></span>
      </div>
    </button>
    <span class="sparkle" style="top:-8px;left:20px;animation-delay:0s;"></span>
    <span class="sparkle" style="top:-6px;right:25px;animation-delay:.5s;"></span>
    <span class="sparkle" style="bottom:-8px;left:35px;animation-delay:.9s;"></span>
    <span class="sparkle" style="bottom:-6px;right:18px;animation-delay:1.4s;"></span>
    <span class="sparkle" style="top:50%;left:-10px;animation-delay:.3s;"></span>
    <span class="sparkle" style="top:50%;right:-10px;animation-delay:1.1s;"></span>
  </div>
</div>

  warning.classList.add('hide');
  
  setTimeout(()=>{
    warning.style.display='none';
    
    // Show Happy Birthday splash
    hbdSplash.style.display='flex';
    setTimeout(()=>{
      hbdSplash.classList.add('show');
    },50);
    
    // Hide splash after 40 seconds and start main animation
    setTimeout(()=>{
      hbdSplash.classList.remove('show');
      hbdSplash.classList.add('hide');
      
      setTimeout(()=>{
        hbdSplash.style.display='none';
        main.style.display='block';
        initAnimation();
      },1500);
    },40000); // 40 seconds
    
  },1200);
}

/* ── ANIMATION VARIABLES ── */
let animationStarted=false;
let cv,ct,W,H;
const flies=[];
let cakePhase='none';
let last;

function initAnimation(){
  if(animationStarted)return;
  animationStarted=true;
  
  cv=document.getElementById('c');
  ct=cv.getContext('2d');
  
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  resize();
  window.addEventListener('resize',resize);
  
  /* ── FIREFLY ── */
  function getN(){
    const w=window.innerWidth;
    if(w<=768) return 600;
    if(w<=1024) return 900;
    return 1500;
  }
  const N=getN();
  const isMobile=window.innerWidth<=768;
  const isTablet=window.innerWidth<=1024&&window.innerWidth>768;
  const glowR=isMobile?3:isTablet?4:6;
  
  class Fly{
    constructor(){
      this.x=Math.random()*W;this.y=Math.random()*H;
      this.vx=(Math.random()-.5)*0.6;this.vy=(Math.random()-.5)*0.6;
      this.spawnDelay=0;this.formDelay=0;
      this.tx=this.x;this.ty=this.y;
      this.ph=Math.random()*Math.PI*2;this.ps=0.01+Math.random()*0.02;
      this.hue=36+Math.random()*18;this.sz=0.2+Math.random()*0.35;
      this.pull=0;this.rainMode=false;this.orbitMode=false;
      this.orbitR=0;this.orbitA=Math.random()*Math.PI*2;
      this.orbitSpeed=(Math.random()-.5)*0.003+0.001;
      this.orbitDrift=Math.random()*Math.PI*2;
      this.orbitDriftSpeed=0.005+Math.random()*0.008;
      this.orbitDriftAmp=(Math.random()-.5)*0.18;
      this.wanderX=(Math.random()-.5)*40;this.wanderY=(Math.random()-.5)*40;
      this.wanderTimer=Math.random()*200;
    }
    update(dt){
      this.ph+=this.ps;
      if(this.rainMode){
        this.vx+=(Math.random()-.5)*0.03;this.vy+=0.008;
        this.vx*=0.98;this.vy=Math.min(this.vy,0.55);
        this.x+=this.vx;this.y+=this.vy;
        if(this.y>H+15){this.x=Math.random()*W;this.y=-10-Math.random()*80;this.vx=(Math.random()-.5)*0.15;this.vy=0.12+Math.random()*0.28;}
        return;
      }
      if(this.orbitMode){
        this.wanderTimer++;
        this.orbitA+=this.orbitSpeed;this.orbitDrift+=this.orbitDriftSpeed;
        const rNow=this.orbitR*(1+this.orbitDriftAmp*Math.sin(this.orbitDrift));
        const tx=W/2+Math.cos(this.orbitA)*rNow+this.wanderX;
        const ty=H/2+Math.sin(this.orbitA)*rNow*0.72+this.wanderY;
        if(this.wanderTimer>120+Math.random()*180){
          this.wanderX+=(Math.random()-.5)*20;this.wanderY+=(Math.random()-.5)*20;
          this.wanderX=Math.max(-60,Math.min(60,this.wanderX));
          this.wanderY=Math.max(-60,Math.min(60,this.wanderY));
          this.wanderTimer=0;
        }
        this.vx+=(tx-this.x)*0.018;this.vy+=(ty-this.y)*0.018;
        this.vx+=(Math.random()-.5)*0.08;this.vy+=(Math.random()-.5)*0.08;
        this.vx*=0.90;this.vy*=0.90;this.x+=this.vx;this.y+=this.vy;
        return;
      }
      this.vx+=(Math.random()-.5)*0.03;this.vy+=(Math.random()-.5)*0.03;
      this.vx*=0.97;this.vy*=0.97;this.x+=this.vx;this.y+=this.vy;
      if(this.x<0||this.x>W)this.vx*=-1;
      if(this.y<0||this.y>H)this.vy*=-1;
    }
    draw(){
      const f=0.5+0.5*Math.sin(this.ph);
      const al=0.3+0.7*f,sz=this.sz*(0.7+0.5*f);
      if(this.rainMode){
        const tl=sz*14*f;ct.save();
        const gr=ct.createLinearGradient(this.x,this.y-tl,this.x,this.y);
        gr.addColorStop(0,'rgba(0,0,0,0)');
        gr.addColorStop(1,`hsla(${this.hue},100%,72%,${al*0.55})`);
        ct.strokeStyle=gr;ct.lineWidth=sz*0.9;
        ct.beginPath();ct.moveTo(this.x,this.y-tl);ct.lineTo(this.x,this.y);ct.stroke();ct.restore();
      }
      const g=ct.createRadialGradient(this.x,this.y,0,this.x,this.y,sz*glowR);
      g.addColorStop(0,`hsla(${this.hue},100%,70%,${al*.3})`);
      g.addColorStop(0.5,`hsla(${this.hue},100%,50%,${al*.08})`);
      g.addColorStop(1,'rgba(0,0,0,0)');
      ct.fillStyle=g;ct.beginPath();ct.arc(this.x,this.y,sz*glowR,0,Math.PI*2);ct.fill();
      ct.fillStyle=`hsla(${this.hue+10},100%,95%,${al})`;
      ct.beginPath();ct.arc(this.x,this.y,sz,0,Math.PI*2);ct.fill();
    }
  }
  
  for(let i=0;i<N;i++)flies.push(new Fly());
  
  function assignRain(){
    flies.forEach(f=>{
      f.rainMode=true;f.orbitMode=false;f.pull=0;
      f.x=Math.random()*W;f.y=-10-Math.random()*H*1.2;
      f.vx=(Math.random()-.5)*0.15;f.vy=0.12+Math.random()*0.28;
    });
  }
  
  function assignCakeCover(){
    cakePhase='covering';
    const cs=Math.min(W*0.68,H*0.68);const cx=W/2,cy=H/2;const pts=[];const step=cs/65;
    for(let gy=cy-cs/2-step;gy<=cy+cs/2+step;gy+=step)
      for(let gx=cx-cs/2-step;gx<=cx+cs/2+step;gx+=step){
        const dc=Math.sqrt((gx-cx)**2+(gy-cy)**2)/(cs/2);
        const count=dc<0.4?6:dc<0.7?4:3;
        for(let c=0;c<count;c++)pts.push({x:gx+(Math.random()-.5)*step*2,y:gy+(Math.random()-.5)*step*2});
      }
    const n=pts.length;const sh=[...pts].sort(()=>Math.random()-.5);
    flies.forEach((f,i)=>{
      f.rainMode=false;f.orbitMode=false;
      const t=sh[i%n];f.tx=t.x;f.ty=t.y;f.pull=0.009;f.formDelay=Math.random()*4;
    });
  }
  
  function assignOrbit(){
    cakePhase='revealing';
    document.getElementById('cakeWrap').style.opacity='1';
    const cs=Math.min(W*0.68,H*0.68)*0.5;
    flies.forEach((f,i)=>{
      f.rainMode=false;f.orbitMode=true;
      const layer=i%5;
      f.orbitR=cs*(0.55+layer*0.18)+(Math.random()-.5)*cs*0.12;
      f.orbitA=Math.random()*Math.PI*2;
      const dir=(Math.random()<0.5?1:-1);
      f.orbitSpeed=dir*(0.0005+Math.random()*0.0018);
      f.orbitDrift=Math.random()*Math.PI*2;
      f.orbitDriftSpeed=0.004+Math.random()*0.007;
      f.orbitDriftAmp=(Math.random()-.5)*0.22;
      f.wanderX=(Math.random()-.5)*35;f.wanderY=(Math.random()-.5)*35;
      f.wanderTimer=Math.random()*200;f.pull=0;
    });
    setTimeout(()=>document.getElementById('btnWrap').classList.add('show'),2000);
  }
  
  assignRain();
  setTimeout(()=>{assignCakeCover();},90000); // 1.5 minutes (90 seconds)
  
  // Fade out background music before cake reveal (start fading 5 seconds before orbit)
  setTimeout(()=>{
    if(backgroundMusic){
      const fadeOutDuration=5000; // 5 seconds fade
      const fadeSteps=50;
      const fadeInterval=fadeOutDuration/fadeSteps;
      const volumeStep=backgroundMusic.volume/fadeSteps;
      let currentStep=0;
      
      const fadeOut=setInterval(()=>{
        currentStep++;
        backgroundMusic.volume=Math.max(0,backgroundMusic.volume-volumeStep);
        if(currentStep>=fadeSteps){
          clearInterval(fadeOut);
          backgroundMusic.pause();
        }
      },fadeInterval);
    }
  },95000); // Start fade at 95 seconds (5 seconds before orbit at 100s)
  
  setTimeout(()=>{assignOrbit();},100000); // 100 seconds total (1.5min rain + 10sec cake cover)
  
  last=performance.now();
  function frame(now){
    requestAnimationFrame(frame);
    const dt=Math.min((now-last)/1000,.05);last=now;
    if(cakePhase==='done'){
      ct.clearRect(0,0,W,H);
    } else if(cakePhase==='scatter'){
      ct.fillStyle='rgba(0,0,0,0.12)';ct.fillRect(0,0,W,H);
    } else if(cakePhase==='revealing'){
      ct.clearRect(0,0,W,H);
    } else if(cakePhase==='covering'){
      ct.fillStyle='rgba(0,0,0,0.18)';ct.fillRect(0,0,W,H);
      const cs=Math.min(W*0.68,H*0.68);
      ct.fillStyle='rgba(0,0,0,0.97)';ct.fillRect(W/2-cs/2-10,H/2-cs/2-10,cs+20,cs+20);
    } else {
      ct.fillStyle='rgba(0,0,0,0.16)';ct.fillRect(0,0,W,H);
    }
    flies.forEach(f=>{f.update(dt);f.draw();});
  }
  requestAnimationFrame(frame);
}

/* ── HAPPY BIRTHDAY ── */
let hbPlaying=false;
function playHBD(){
  if(hbPlaying)return;
  hbPlaying=true;
  const btn=document.getElementById('playBtn');
  btn.style.opacity='0.5';btn.style.pointerEvents='none';
  const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const notes=[264,264,297,264,352,330,264,264,297,264,396,352,264,264,528,440,352,330,297,466,466,440,352,396,352];
  const durations=[300,150,450,450,450,900,300,150,450,450,450,900,300,150,450,450,450,450,900,300,150,450,450,450,900];
  const rounds=3;
  let startTime=audioCtx.currentTime;
  const totalDur=durations.reduce((a,b)=>a+b,0)/1000*rounds;
  for(let r=0;r<rounds;r++){
    notes.forEach((freq,i)=>{
      const osc=audioCtx.createOscillator();
      const gn=audioCtx.createGain();
      osc.type='sine';
      osc.frequency.setValueAtTime(freq,audioCtx.currentTime);
      gn.gain.setValueAtTime(0,startTime);
      gn.gain.linearRampToValueAtTime(0.3,startTime+0.01);
      gn.gain.exponentialRampToValueAtTime(0.001,startTime+durations[i]/1000);
      osc.connect(gn);gn.connect(audioCtx.destination);
      osc.start(startTime);osc.stop(startTime+durations[i]/1000);
      startTime+=durations[i]/1000;
    });
  }
  setTimeout(()=>{
    const btnWrap=document.getElementById('btnWrap');
    btnWrap.style.transition='opacity 1.5s ease';
    btnWrap.style.opacity='0';
    setTimeout(()=>{btnWrap.style.display='none';},1600);
    setTimeout(()=>showMusicBtn(),1800);
  },totalDur*1000+500);
}

/* ── ปุ่มเล่นเพลงหลัง HB ── */
function showMusicBtn(){
  const wrap=document.createElement('div');
  wrap.id='musicBtnWrap';
  wrap.style.cssText=`
    position:fixed;bottom:7vh;left:50%;transform:translateX(-50%);
    z-index:10;opacity:0;transition:opacity 1.5s ease;pointer-events:auto;
    display:flex;flex-direction:column;align-items:center;gap:12px;
  `;
  wrap.innerHTML=`
    <div style="color:rgba(255,220,100,0.7);font-family:'Cinzel',serif;font-size:clamp(10px,1.8vw,13px);letter-spacing:3px;margin-bottom:4px;"> &nbsp; For You &nbsp; </div>
    <button id="musicPlayBtn" onclick="toggleSong()" style="
      position:relative;padding:14px 38px;
      font-family:'Cinzel',serif;font-size:clamp(12px,2vw,16px);
      letter-spacing:3px;color:#ffe97a;background:transparent;border:none;
      cursor:pointer;outline:none;-webkit-tap-highlight-color:transparent;user-select:none;
      box-shadow:0 0 18px 4px rgba(255,200,50,0.35),0 0 40px 8px rgba(255,150,0,0.18);
      border-radius:50px;
    ">
      <span id="musicBtnInner" style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:1.4em;"></span>
        <span>Play Song</span>
      </span>
    </button>
    <span class="sparkle" style="top:-8px;left:20px;animation-delay:0s;"></span>
    <span class="sparkle" style="top:-6px;right:25px;animation-delay:.6s;"></span>
    <span class="sparkle" style="bottom:-8px;left:30px;animation-delay:1s;"></span>
    <span class="sparkle" style="bottom:-6px;right:20px;animation-delay:1.5s;"></span>
  `;
  const st=document.createElement('style');
  st.textContent=`
    #musicPlayBtn::before{content:'';position:absolute;inset:0;border-radius:50px;
      background:linear-gradient(135deg,#7a5100,#f5c842,#b8860b,#ffe066,#7a5100);
      background-size:300% 300%;animation:goldShift 3s ease infinite;z-index:-1;}
    #musicPlayBtn::after{content:'';position:absolute;inset:2px;border-radius:48px;
      background:radial-gradient(ellipse at center,#1a0a00 60%,#2e1500);z-index:-1;}
    #musicPlayBtn:active{transform:scale(0.96);}
  `;
  document.head.appendChild(st);
  document.body.appendChild(wrap);
  setTimeout(()=>{wrap.style.opacity='1';},50);
}

let playSongAudio=null,songPlaying=false; // เพลงที่ 2 - เล่นจากปุ่ม Play Song
function toggleSong(){
  const btn=document.getElementById('musicBtnInner');
  if(!playSongAudio){
    playSongAudio=new Audio('Ed Sheeran - Photograph Official Lyric Video.mp3'); // ← เพลงที่ 2 (ปุ่ม Play Song) - เปลี่ยนชื่อไฟล์ตรงนี้
    playSongAudio.volume=0.6;
    playSongAudio.loop=true;
  }
  if(!songPlaying){
    playSongAudio.play();
    songPlaying=true;
    btn.innerHTML='<span style="font-size:1.4em;"></span><span>Pause</span>';
  } else {
    playSongAudio.pause();
    songPlaying=false;
    btn.innerHTML='<span style="font-size:1.4em;"></span><span>Play Song</span>';
  }
}
